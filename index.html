<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Block Blast!</title>
<style>
:root {
  --cs: clamp(38px, min(calc((100vw - 20px) / 8), calc((100vh - 230px) / 8)), 68px);
  --gap: 3px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html,body { width:100%; height:100%; font-family:Arial,sans-serif; overflow:hidden; }

/* BG */
#bg {
  position:fixed; inset:0; z-index:0;
  background: linear-gradient(160deg,#6350d8 0%,#4a3db8 40%,#35289a 100%);
  transition: background 0.6s;
}
#bg.skin-2  { background: linear-gradient(160deg,#1a6b3a 0%,#145c2e 40%,#0d3d1e 100%); }
#bg.skin-3  { background: linear-gradient(160deg,#7a1a1a 0%,#5c1414 40%,#3d0d0d 100%); }
#bg.skin-4  { background: linear-gradient(160deg,#1a3d7a 0%,#14305c 40%,#0d1f3d 100%); }
#bg.skin-5  { background: linear-gradient(160deg,#6a1a7a 0%,#55145c 40%,#380d3d 100%); }
#bg.skin-6  { background: linear-gradient(160deg,#1a6a6a 0%,#145555 40%,#0d3838 100%); }
#bg.skin-7  { background: linear-gradient(160deg,#7a5a1a 0%,#5c4214 40%,#3d2b0d 100%); }
#bg.skin-8  { background: linear-gradient(160deg,#2a2a2a 0%,#1a1a1a 40%,#0d0d0d 100%); }
#bg.skin-9  { background: linear-gradient(160deg,#6a3a1a 0%,#4d2a12 40%,#33190b 100%); }
#bg.skin-10 { background: radial-gradient(ellipse at top,#330066 0%,#000033 100%); }

/* APP */
#app {
  position:relative; z-index:1;
  width:100vw; height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:space-between;
  padding:14px 10px 10px;
}

/* TOP BAR */
#topbar {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  padding:0 4px; flex-shrink:0; gap:8px;
}
#best-box {
  display:flex; align-items:center; gap:6px;
  background:rgba(0,0,0,0.25); border-radius:20px; padding:7px 13px;
  border:1px solid rgba(255,255,255,0.12);
}
#best-box .crown { font-size:20px; }
#best-val { font-size:17px; font-weight:900; color:#f5c518; }

/* COINS in topbar */
#coin-box {
  display:flex; align-items:center; gap:5px;
  background:rgba(0,0,0,0.25); border-radius:20px; padding:7px 13px;
  border:1px solid rgba(255,255,255,0.12);
  flex:1; justify-content:center;
}
#coin-box .coin-icon { font-size:18px; }
#coin-val { font-size:17px; font-weight:900; color:#ffe066; }

/* SHOP BTN */
#shop-btn {
  width:44px; height:44px;
  background:linear-gradient(135deg,#f5c518,#d49000);
  border:none; border-radius:50%; font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 12px rgba(245,197,24,0.4), 0 3px 0 #a06000;
  transition:all .15s; flex-shrink:0;
}
#shop-btn:active { transform:translateY(2px); box-shadow:0 1px 6px rgba(245,197,24,0.4),0 1px 0 #a06000; }

#mute-btn {
  width:40px; height:40px; flex-shrink:0;
  background:rgba(255,255,255,0.12); border:1.5px solid rgba(255,255,255,0.2);
  border-radius:50%; font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:#fff;
}

/* SCORE */
#score-area { text-align:center; flex-shrink:0; }
#score-display {
  font-size: clamp(72px,16vw,110px);
  font-weight:900; color:#fff; line-height:1;
  text-shadow:0 4px 24px rgba(0,0,0,0.35), 0 0 40px rgba(255,255,255,0.1);
  letter-spacing:-2px;
}

/* GRID */
#grid-wrap {
  flex-shrink:0; background:rgba(15,18,80,0.75); border-radius:18px; padding:8px;
  box-shadow:0 12px 40px rgba(0,0,0,0.45), inset 0 2px 0 rgba(255,255,255,0.08), 0 0 0 2px rgba(255,255,255,0.07);
  position:relative;
}
#grid {
  display:grid; grid-template-columns:repeat(8,var(--cs)); grid-template-rows:repeat(8,var(--cs));
  gap:var(--gap); position:relative;
}

/* CELL */
.cell {
  width:var(--cs); height:var(--cs); border-radius:8px;
  background:rgba(40,50,130,0.5); border:1px solid rgba(80,100,200,0.25);
  position:relative; overflow:hidden; transition:none;
}
.cell.filled {
  border:none; border-radius:8px;
  box-shadow:
    inset 0 -5px 0 rgba(0,0,0,0.38),
    inset 0 4px 0 rgba(255,255,255,0.4),
    inset 4px 0 0 rgba(255,255,255,0.18),
    inset -4px 0 0 rgba(0,0,0,0.2),
    0 4px 10px rgba(0,0,0,0.3);
}
.cell.filled::before {
  content:''; position:absolute; top:4px; left:6px;
  width:52%; height:36%; background:rgba(255,255,255,0.38); border-radius:5px; pointer-events:none;
}
.cell.filled::after {
  content:''; position:absolute; bottom:3px; right:4px;
  width:40%; height:28%; background:rgba(0,0,0,0.18); border-radius:4px; pointer-events:none;
}

/* BLOCK SKIN COLORS */
/* Skin 1 - default */
.skin1 .c1{background:linear-gradient(145deg,#ff5c5c,#cc1a1a)}
.skin1 .c2{background:linear-gradient(145deg,#5ba8f5,#1e68d4)}
.skin1 .c3{background:linear-gradient(145deg,#4ee87a,#1da84a)}
.skin1 .c4{background:linear-gradient(145deg,#ffe03a,#c89000)}
.skin1 .c5{background:linear-gradient(145deg,#c46ef5,#8820d8)}

.skin3 .c5{background:linear-gradient(145deg,#dbb2ff,#c077ff)}

.skin3 .c7{background:linear-gradient(145deg,#ffcba4,#ffaa6e)}

.skin4 .c1{background:linear-gradient(145deg,#ff2200,#aa0000)}
.skin4 .c2{background:linear-gradient(145deg,#ff6600,#cc3300)}
.skin4 .c3{background:linear-gradient(145deg,#ffaa00,#cc7700)}
.skin4 .c4{background:linear-gradient(145deg,#ffee00,#ccaa00)}
.skin4 .c5{background:linear-gradient(145deg,#ff4400,#bb1100)}
.skin4 .c6{background:linear-gradient(145deg,#ff8800,#cc5500)}

.skin5 .c1{background:linear-gradient(145deg,#aaddff,#6699cc)}

.skin6 .c1{background:linear-gradient(145deg,#ffd700,#b8860b)}
.skin6 .c2{background:linear-gradient(145deg,#ffec8b,#cdaa3d)}
.skin6 .c3{background:linear-gradient(145deg,#daa520,#8b6914)}

/* Skin 7 - galaxy */
.skin7 .c1{background:linear-gradient(145deg,#9b59b6,#6c3483)}

/* Skin 8 - candy */
.skin8 .c1{background:linear-gradient(145deg,#ff69b4,#cc1177)}

/* Skin 9 - earth */

/* Skin 10 - midnight */

/* PREVIEW */
.cell.prev-ok  { opacity:.72; transform:scale(0.91); box-shadow:inset 0 -5px 0 rgba(0,0,0,.38),inset 0 4px 0 rgba(255,255,255,.4); }
.cell.prev-ok::before,.cell.prev-ok::after { display:none; }
.cell.prev-bad { background:rgba(255,50,50,0.28)!important; border:1.5px solid rgba(255,80,80,0.5)!important; box-shadow:none!important; transform:scale(0.87); }
.cell.prev-bad::before,.cell.prev-bad::after { display:none; }

/* ANIM */
.cell.pop-in  { animation:popIn  .24s cubic-bezier(.34,1.56,.64,1) forwards; }
.cell.pop-out { animation:popOut .3s ease forwards; }
@keyframes popIn  { 0%{transform:scale(.3);opacity:0} 100%{transform:scale(1);opacity:1} }
@keyframes popOut { 0%{transform:scale(1);opacity:1} 45%{transform:scale(1.22)} 100%{transform:scale(0);opacity:0} }
.ln-flash { position:absolute; background:rgba(255,255,255,0.55); border-radius:7px; z-index:10; pointer-events:none; animation:flAnim .38s ease forwards; }
@keyframes flAnim { 0%{opacity:1} 100%{opacity:0} }

/* TRAY */
#tray { display:flex; gap:clamp(10px,3vw,24px); justify-content:center; align-items:center; flex-shrink:0; padding:4px 0; }
.piece-slot {
  width:clamp(90px,22vw,120px); height:clamp(80px,20vw,110px);
  display:flex; align-items:center; justify-content:center; cursor:grab;
  transition:transform .15s,filter .15s; position:relative;
}
.piece-slot:hover:not(.used) { transform:scale(1.1) translateY(-4px); filter:drop-shadow(0 6px 16px rgba(0,0,0,0.4)); }
.piece-slot.used { opacity:.18; pointer-events:none; }
.piece-slot.drag-src { opacity:.3; }
.p-grid { display:grid; gap:2px; }
.p-cell {
  width:clamp(18px,4.5vw,24px); height:clamp(18px,4.5vw,24px); border-radius:5px;
  position:relative; overflow:hidden;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.35),inset 0 3px 0 rgba(255,255,255,.38),inset 3px 0 0 rgba(255,255,255,.15),inset -3px 0 0 rgba(0,0,0,.18);
}
.p-cell::before { content:''; position:absolute; top:2px; left:3px; width:52%; height:36%; background:rgba(255,255,255,.32); border-radius:3px; }
.p-cell.empty { visibility:hidden; box-shadow:none; }
.p-cell.empty::before { display:none; }

/* GHOST */
#ghost {
  position:fixed; pointer-events:none; z-index:9999; display:none;
  filter:drop-shadow(0 10px 24px rgba(0,0,0,.5)); opacity:.9; will-change:left,top;
}
.g-grid { display:grid; gap:var(--gap); }
.g-cell {
  width:var(--cs); height:var(--cs); border-radius:8px;
  position:relative; overflow:hidden;
  box-shadow:inset 0 -5px 0 rgba(0,0,0,.38),inset 0 4px 0 rgba(255,255,255,.4),inset 4px 0 0 rgba(255,255,255,.18),inset -4px 0 0 rgba(0,0,0,.2),0 4px 10px rgba(0,0,0,.3);
}
.g-cell::before { content:''; position:absolute; top:4px; left:6px; width:52%; height:36%; background:rgba(255,255,255,.35); border-radius:5px; }
.g-cell.empty { visibility:hidden; box-shadow:none; }
.g-cell.empty::before { display:none; }

/* FX */
.fx-p { position:fixed; pointer-events:none; z-index:8888; animation:fxRise .9s ease forwards; }
@keyframes fxRise { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-90px) scale(1.4);opacity:0} }
.fx-t { position:fixed; pointer-events:none; z-index:8888; font-weight:900; text-shadow:0 2px 8px rgba(0,0,0,.35); animation:fxRise 1.1s ease forwards; white-space:nowrap; }

/* COMBO */
#combo-badge {
  position:fixed; top:80px; right:20px;
  background:linear-gradient(135deg,#ff5aaa,#d4006a);
  border-radius:16px; padding:8px 16px;
  font-size:20px; font-weight:900; color:#fff;
  box-shadow:0 4px 18px rgba(255,60,140,.45);
  display:none; z-index:200;
  animation:bumpIn .28s cubic-bezier(.34,1.56,.64,1);
}
#combo-badge.show { display:block; }
@keyframes bumpIn { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }

/* SHAKE */
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
.shake { animation:shake .35s ease; }

/* ===== OVERLAYS ===== */
.overlay {
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:500;
  background:linear-gradient(160deg,#6350d8 0%,#4a3db8 40%,#35289a 100%);
}
#ov-start .big-crown { font-size:80px; margin-bottom:10px; filter:drop-shadow(0 6px 20px rgba(245,197,24,.5)); }
#ov-start h1 { font-size:44px; font-weight:900; color:#fff; text-shadow:0 4px 16px rgba(0,0,0,.3); margin-bottom:10px; }
#ov-start p { font-size:15px; color:rgba(255,255,255,.65); text-align:center; padding:0 36px; line-height:1.65; margin-bottom:32px; }
#ov-over { display:none; }

/* NB CARD */
.nb-card {
  width:min(300px,80vw); height:min(220px,55vw);
  background:#181c60; border-radius:18px;
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  box-shadow:0 12px 40px rgba(0,0,0,.5); margin-bottom:28px;
}
.nb-bg-blocks { position:absolute; inset:0; display:grid; grid-template-columns:repeat(6,1fr); grid-template-rows:repeat(4,1fr); opacity:.55; }
.nbb { border-radius:4px; margin:2px; }
.nbb.b1{background:linear-gradient(145deg,#ff5c5c,#cc1a1a)}
.nbb.b2{background:linear-gradient(145deg,#5ba8f5,#1e68d4)}
.nbb.b3{background:linear-gradient(145deg,#4ee87a,#1da84a)}
.nbb.b4{background:linear-gradient(145deg,#ffe03a,#c89000)}
.nbb.b5{background:linear-gradient(145deg,#c46ef5,#8820d8)}
.nbb.b6{background:linear-gradient(145deg,#3af0e8,#0aabaa)}
.nb-rays { position:absolute; inset:0; background:conic-gradient(from 0deg,transparent 18deg,rgba(255,220,50,.2) 28deg,transparent 48deg,rgba(255,220,50,.12) 58deg,transparent 78deg); animation:spinRays 5s linear infinite; }
@keyframes spinRays { to{transform:rotate(360deg)} }
.nb-content { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:6px; }
.nb-crown-icon { font-size:50px; filter:drop-shadow(0 4px 14px rgba(0,0,0,.4)); }
.nb-banner { background:linear-gradient(135deg,#9b3fc8,#6b1fa0); border-radius:24px; padding:5px 26px; font-size:17px; font-weight:900; color:#fff; box-shadow:0 4px 14px rgba(0,0,0,.35); letter-spacing:1px; }
.nb-score-big { font-size:clamp(44px,10vw,60px); font-weight:900; color:#f5c518; text-shadow:0 0 24px rgba(245,197,24,.7),0 4px 0 rgba(0,0,0,.3); line-height:1; }

/* PLAY BUTTON */
.play-btn {
  background:linear-gradient(145deg,#f5c518,#d49000); border:none; border-radius:50px;
  width:min(240px,65vw); height:58px; font-size:20px; font-weight:900; color:#fff;
  cursor:pointer; box-shadow:0 6px 0 #a06000,0 10px 24px rgba(0,0,0,.35);
  transition:all .13s; display:flex; align-items:center; justify-content:center; gap:8px;
}
.play-btn:active { transform:translateY(5px); box-shadow:0 1px 0 #a06000,0 4px 10px rgba(0,0,0,.3); }

/* ===== SHOP OVERLAY ===== */
#shop-overlay {
  position:fixed; inset:0; z-index:600;
  background:rgba(0,0,0,0.7); display:none;
  align-items:flex-end; justify-content:center;
}
#shop-overlay.open { display:flex; }
#shop-panel {
  width:100%; max-height:85vh;
  background:linear-gradient(175deg,#2a1f6e,#1a1450);
  border-radius:28px 28px 0 0;
  display:flex; flex-direction:column;
  animation:slideUpPanel .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUpPanel { from{transform:translateY(100%)} to{transform:translateY(0)} }
#shop-header {
  padding:20px 20px 12px;
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
  flex-shrink:0;
}
#shop-header h2 { font-size:22px; font-weight:900; color:#fff; }
#shop-coins-display { display:flex; align-items:center; gap:6px; font-size:16px; font-weight:900; color:#ffe066; }
#shop-close {
  width:36px; height:36px; background:rgba(255,255,255,0.1); border:none; border-radius:50%;
  font-size:18px; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
}

/* SHOP TABS */
#shop-tabs {
  display:flex; padding:12px 16px 0; gap:8px; flex-shrink:0;
}
.shop-tab {
  flex:1; padding:10px; border:none; border-radius:14px 14px 0 0;
  font-size:13px; font-weight:700; cursor:pointer;
  background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5);
  transition:all .2s;
}
.shop-tab.active { background:rgba(255,255,255,0.18); color:#fff; }

/* SHOP GRID */
#shop-body { overflow-y:auto; padding:12px 16px 20px; flex:1; }
.shop-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }

.shop-item {
  background:rgba(255,255,255,0.08);
  border:2px solid rgba(255,255,255,0.1);
  border-radius:18px; padding:14px 10px;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  cursor:pointer; transition:all .2s; position:relative;
}
.shop-item:hover { background:rgba(255,255,255,0.14); border-color:rgba(255,255,255,0.25); }
.shop-item.owned { border-color:rgba(80,255,120,0.5); background:rgba(80,255,120,0.08); }
.shop-item.equipped { border-color:#f5c518; background:rgba(245,197,24,0.1); }

.shop-item-preview {
  width:80px; height:80px; border-radius:12px;
  display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); gap:2px;
  overflow:hidden;
}
.shop-prev-cell { border-radius:3px; }

.shop-bg-preview {
  width:80px; height:60px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
}

.shop-item-name { font-size:13px; font-weight:700; color:#fff; text-align:center; }
.shop-item-price {
  display:flex; align-items:center; gap:4px;
  font-size:13px; font-weight:900; color:#ffe066;
}
.shop-item-price.free { color:#4ee87a; }

.shop-badge {
  position:absolute; top:8px; right:8px;
  font-size:11px; font-weight:900; padding:3px 7px; border-radius:8px;
}
.badge-owned    { background:#4ee87a; color:#000; }
.badge-equipped { background:#f5c518; color:#000; }

.buy-btn {
  width:100%; padding:8px; border:none; border-radius:10px;
  font-size:13px; font-weight:700; cursor:pointer;
  background:linear-gradient(135deg,#f5c518,#d49000); color:#fff;
  transition:all .15s;
}
.buy-btn:disabled { background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.4); cursor:default; }
.equip-btn {

}

@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
</style>
</head>
<body>

<div id="app">

  </div>

    <div id="score-display">0</div>
  </div>

  <div id="grid-wrap" class="skin1">
    <div id="grid"></div>
  </div>

  <div id="tray"></div>
</div>

<script>
// ============================================================
// SAVE DATA
// ============================================================
let coins     = +localStorage.getItem('bb_coins') || 0;
let best      = +localStorage.getItem('bb_best')  || 0;
let ownedBgs  = JSON.parse(localStorage.getItem('bb_ownedBgs')  || '[1]');
let ownedBlks = JSON.parse(localStorage.getItem('bb_ownedBlks') || '[1]');
let equippedBg  = +localStorage.getItem('bb_eqBg')  || 1;
let equippedBlk = +localStorage.getItem('bb_eqBlk') || 1;

function saveData(){
  localStorage.setItem('bb_coins',    coins);
  localStorage.setItem('bb_best',     best);
  localStorage.setItem('bb_ownedBgs',  JSON.stringify(ownedBgs));
  localStorage.setItem('bb_ownedBlks', JSON.stringify(ownedBlks));
  localStorage.setItem('bb_eqBg',     equippedBg);
  localStorage.setItem('bb_eqBlk',    equippedBlk);
}

// ============================================================
// SHOP DATA
// ============================================================
const BG_SKINS = [
  {id:1,  name:'Mặc Định', price:0,    gradient:'linear-gradient(160deg,#6350d8 0%,#4a3db8 40%,#35289a 100%)'},
  {id:2,  name:'Nền 2',    price:1000, img:'bg2.jpg'},
  {id:3,  name:'Nền 3',    price:2000, img:'bg3.jpg'},
  {id:4,  name:'Nền 4',    price:3000, img:'bg4.jpg'},
  {id:5,  name:'Nền 5',    price:4000, img:'bg5.jpg'},
  {id:6,  name:'Nền 6',    price:5000, img:'bg6.jpg'},
  {id:7,  name:'Nền 7',    price:6000, img:'bg7.jpg'},
  {id:8,  name:'Nền 8',    price:7000, img:'bg8.jpg'},
  {id:9,  name:'Nền 9',    price:8000, img:'bg9.jpg'},
  {id:10, name:'Nền 10',   price:9000, img:'bg10.jpg'},
];

const BLOCK_SKINS = [
  {id:1,  name:'Mặc Định', price:0,    colors:['#ff5c5c','#5ba8f5','#4ee87a','#ffe03a','#c46ef5','#3af0e8','#ff9a45']},
  {id:2,  name:'Khối 2',   price:1000, img:'block2.jpg'},
  {id:3,  name:'Khối 3',   price:2000, img:'block3.jpg'},
  {id:4,  name:'Khối 4',   price:3000, img:'block4.jpg'},
  {id:5,  name:'Khối 5',   price:4000, img:'block5.jpg'},
  {id:6,  name:'Khối 6',   price:5000, img:'block6.jpg'},
  {id:7,  name:'Khối 7',   price:6000, img:'block7.jpg'},
  {id:8,  name:'Khối 8',   price:7000, img:'block8.jpg'},
  {id:9,  name:'Khối 9',   price:8000, img:'block9.jpg'},
  {id:10, name:'Khối 10',  price:9000, img:'block10.jpg'},
];

// ============================================================
// AUDIO
// ============================================================
let actx=null,mGain,musicOn=false,mTimer=null,mIdx=0,mBeat=0;
const MEL=[[523,.18],[587,.18],[659,.18],[698,.36],[659,.18],[587,.18],[523,.36],[440,.18],[494,.18],[523,.36],[494,.18],[440,.18],[392,.72],[523,.18],[659,.18],[784,.36],[698,.18],[659,.18],[587,.36],[523,.18],[494,.18],[440,.36],[392,.36],[349,.36],[392,.72]];
function initAudio(){if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();mGain=actx.createGain();mGain.gain.value=.7;mGain.connect(actx.destination);}}
function tone(f,d,tp='sine',v=.2,dl=0){if(!actx)return;try{const o=actx.createOscillator(),g=actx.createGain();o.type=tp;o.frequency.value=f;const t=actx.currentTime+dl;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(mGain);o.start(t);o.stop(t+d);}catch(e){}}
function sfxPlace(){tone(340,.06,'square',.35);tone(460,.09,'square',.28,.05);}
function sfxBad(){tone(150,.18,'sawtooth',.42);}
function sfxClear(n){[523,659,784,1047,1319].slice(0,n+1).forEach((f,i)=>tone(f,.22,'triangle',.5,i*.055));}
function sfxCombo(){tone(880,.14,'triangle',.6);tone(1046,.14,'triangle',.55,.1);tone(1318,.25,'triangle',.7,.2);}
function sfxOver(){[380,320,260,210,170].forEach((f,i)=>tone(f,.3,'sawtooth',.5,i*.13));}
function sfxBuy(){tone(880,.1,'triangle',.4);tone(1100,.15,'triangle',.5,.1);}
function startMusic(){if(mTimer)return;initAudio();function nt(){if(!musicOn)return;const[f,d]=MEL[mIdx%MEL.length];mIdx++;tone(f,d*.82,'triangle',.28);if(mBeat%4===0)tone(f/2,d,'sine',.22);if(mBeat%2===0)tone(100,.04,'square',.18);mBeat++;mTimer=setTimeout(nt,d*820);}nt();}
function stopMusic(){clearTimeout(mTimer);mTimer=null;}
function toggleMusic(){initAudio();if(actx.state==='suspended')actx.resume();musicOn=!musicOn;document.getElementById('mute-btn').textContent=musicOn?'🔇':'🎵';musicOn?startMusic():stopMusic();}

// ============================================================
// GAME STATE
// ============================================================
const COLS=8,ROWS=8,GAP_PX=3;
function getCS(){return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cs'))||48;}

let grid=[],pieces=[];
let score=0,combo=0,linesClr=0,piecesPlaced=0,level=1,active=false;

const SHAPES=[
  {cells:[[0,0]],c:1},{cells:[[0,0],[0,1]],c:2},{cells:[[0,0],[1,0]],c:3},
  {cells:[[0,0],[0,1],[0,2]],c:4},{cells:[[0,0],[1,0],[2,0]],c:5},
  {cells:[[0,0],[0,1],[1,0]],c:6},{cells:[[0,0],[0,1],[1,1]],c:1},
  {cells:[[0,0],[1,0],[1,1]],c:2},{cells:[[0,1],[1,0],[1,1]],c:3},
  {cells:[[0,0],[0,1],[0,2],[0,3]],c:4},{cells:[[0,0],[1,0],[2,0],[3,0]],c:5},
  {cells:[[0,0],[0,1],[1,0],[1,1]],c:6},
  {cells:[[0,0],[1,0],[2,0],[2,1]],c:7},{cells:[[0,0],[0,1],[0,2],[1,0]],c:1},
  {cells:[[0,0],[0,1],[1,1],[2,1]],c:2},{cells:[[0,2],[1,0],[1,1],[1,2]],c:3},
  {cells:[[0,1],[1,1],[2,0],[2,1]],c:4},{cells:[[0,0],[1,0],[1,1],[1,2]],c:5},
  {cells:[[0,0],[0,1],[1,0],[2,0]],c:6},{cells:[[0,0],[0,1],[0,2],[1,2]],c:7},
  {cells:[[0,1],[0,2],[1,0],[1,1]],c:1},{cells:[[0,0],[0,1],[1,1],[1,2]],c:2},
  {cells:[[0,0],[0,1],[0,2],[1,1]],c:3},{cells:[[0,0],[1,0],[1,1],[2,0]],c:4},
  {cells:[[0,0],[0,1],[0,2],[0,3],[0,4]],c:5},{cells:[[0,0],[1,0],[2,0],[3,0],[4,0]],c:6},
  {cells:[[0,0],[0,1],[0,2],[1,0],[1,1],[1,2]],c:7},{cells:[[0,0],[0,1],[1,0],[1,1],[2,0],[2,1]],c:1},
];

// NB card blocks
(function(){const colors=['b1','b2','b3','b4','b5','b6'];const nb=document.getElementById('nb-blocks');for(let i=0;i<24;i++){const d=document.createElement('div');d.className='nbb '+colors[Math.floor(Math.random()*colors.length)];nb.appendChild(d);}})();

// ============================================================
// APPLY SKINS
// ============================================================
function applySkins(){
  const bg=document.getElementById('bg');
  const bgData=BG_SKINS.find(s=>s.id===equippedBg);
  if(bgData){
    if(bgData.gradient){
      bg.style.background=bgData.gradient;
      bg.style.backgroundImage='';
    } else {
      bg.style.background='';
      bg.style.backgroundImage=`url('${bgData.img}')`;
      bg.style.backgroundSize='cover';
      bg.style.backgroundPosition='center';
    }
  }
  renderTray();
}

function getBlockColor(skinId, colorIdx){
  // Returns CSS background value for a cell
  const skin=BLOCK_SKINS.find(s=>s.id===skinId);
  if(!skin) return '#888';
  // Use the image as background with offset to simulate different "colors"
  // Each colorIdx picks a different region of the texture image
  return null; // signal to use image
}

// Predefined gradient pairs for default skin (light, dark)
const DEFAULT_GRADIENTS = [
  ['#ff5c5c','#cc1a1a'],
  ['#5ba8f5','#1e68d4'],
  ['#4ee87a','#1da84a'],
  ['#ffe03a','#c89000'],
  ['#c46ef5','#8820d8'],
  ['#3af0e8','#0aabaa'],
  ['#ff9a45','#d45c00'],
];

function applyBlockStyle(el, skinId, colorIdx){
  const skin=BLOCK_SKINS.find(s=>s.id===skinId);
  if(!skin){el.style.cssText+='background:#888;';return;}
  // Reset first
  el.style.backgroundImage='none';
  el.style.filter='none';
  if(skin.colors){
    // Default skin — use hardcoded gradient pairs, no darken() math
    const [light, dark]=DEFAULT_GRADIENTS[(colorIdx-1)%DEFAULT_GRADIENTS.length];
    el.style.background=`linear-gradient(145deg,${light},${dark})`;
  } else {
    // Image skin
    const hues=['0deg','45deg','90deg','135deg','180deg','225deg','270deg'];
    el.style.background='';
    el.style.backgroundImage=`url('${skin.img}')`;
    el.style.backgroundSize='cover';
    el.style.backgroundPosition='center';
    el.style.filter=`hue-rotate(${hues[(colorIdx-1)%hues.length]}) brightness(1.05)`;
  }
}

// ============================================================
// GRID
// ============================================================
function initGrid(){grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));}

function buildGridDOM(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const d=document.createElement('div');d.className='cell';d.id=`c${r}_${c}`;g.appendChild(d);
  }
}

function renderGrid(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const d=document.getElementById(`c${r}_${c}`);
    if(grid[r][c]){
      d.className='cell filled';
      applyBlockStyle(d,equippedBlk,grid[r][c]);
    } else {
      d.className='cell';
      d.style.backgroundImage='';d.style.filter='';d.style.background='';
    }
  }
}

// ============================================================
// TRAY
// ============================================================
function genTray(){
  const mx=Math.min(3+level,9);
  const pool=SHAPES.filter(s=>s.cells.length<=mx);
  pieces=[0,1,2].map(()=>{
    const shape=pool[Math.floor(Math.random()*pool.length)];
    const color=Math.floor(Math.random()*7)+1;
    // All cells same color
    const cellColors=shape.cells.map(()=>color);
    return{...shape, c:color, cellColors};
  });
  renderTray();
}

function renderTray(){
  const tr=document.getElementById('tray');tr.innerHTML='';
  pieces.forEach((p,i)=>{
    const sl=document.createElement('div');
    sl.className='piece-slot'+(!p?' used':'');sl.id=`sl${i}`;
    if(p){
      const maxR=Math.max(...p.cells.map(c=>c[0]))+1;
      const maxC=Math.max(...p.cells.map(c=>c[1]))+1;
      const pg=document.createElement('div');pg.className='p-grid';
      pg.style.gridTemplateColumns=`repeat(${maxC},clamp(18px,4.5vw,24px))`;
      pg.style.gridTemplateRows=`repeat(${maxR},clamp(18px,4.5vw,24px))`;
      for(let r=0;r<maxR;r++)for(let c=0;c<maxC;c++){
        const pc=document.createElement('div');
        const cellIdx=p.cells.findIndex(([pr,pc2])=>pr===r&&pc2===c);
        const f=cellIdx>=0;
        pc.className='p-cell'+(f?'':' empty');
        if(f) applyBlockStyle(pc,equippedBlk,p.cellColors[cellIdx]);
        pg.appendChild(pc);
      }
      sl.appendChild(pg);
      sl.addEventListener('mousedown',e=>dStart(e,i));
      sl.addEventListener('touchstart',e=>dStart(e,i),{passive:false});
    }
    tr.appendChild(sl);
  });
}

// ============================================================
// DRAG & DROP
// ============================================================
let dIdx=null,dPiece=null,prevCells=[];
let _rafPending=false,_lastX=0,_lastY=0;

function dStart(e,i){
  if(!active||!pieces[i])return;
  e.preventDefault();
  initAudio();if(actx.state==='suspended')actx.resume();
  dIdx=i;dPiece=pieces[i];
  buildGhost();
  const p=evp(e);posGhost(p.x,p.y);
  document.getElementById('ghost').style.display='block';
  document.getElementById(`sl${i}`)?.classList.add('drag-src');
  document.addEventListener('mousemove',dMove);
  document.addEventListener('mouseup',dEnd);
  document.addEventListener('touchmove',dMove,{passive:false});
  document.addEventListener('touchend',dEnd);
}

function buildGhost(){
  const gh=document.getElementById('ghost');gh.innerHTML='';
  const p=dPiece;
  const maxR=Math.max(...p.cells.map(c=>c[0]))+1;
  const maxC=Math.max(...p.cells.map(c=>c[1]))+1;
  const cs=getCS();
  const g=document.createElement('div');g.className='g-grid';
  g.style.gridTemplateColumns=`repeat(${maxC},${cs}px)`;
  g.style.gridTemplateRows=`repeat(${maxR},${cs}px)`;
  g.style.gap=GAP_PX+'px';
  for(let r=0;r<maxR;r++)for(let c=0;c<maxC;c++){
    const gc=document.createElement('div');
    const ci=p.cells.findIndex(([pr,pc])=>pr===r&&pc===c);
    const f=ci>=0;
    gc.className='g-cell'+(f?'':' empty');
    if(f) applyBlockStyle(gc,equippedBlk,p.cellColors[ci]);
    g.appendChild(gc);
  }
  gh.appendChild(g);
}

function posGhost(x,y){
  const gh=document.getElementById('ghost');
  const step=getCS()+GAP_PX;
  gh.style.left=(x-step*0.5)+'px';
  gh.style.top=(y-step*0.8)+'px';
}

function evp(e){
  if(e.touches)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}

function cursorToGrid(cx,cy){
  const gr=document.getElementById('grid').getBoundingClientRect();
  const step=getCS()+GAP_PX;
  const ghostLeft=cx-step*0.5;
  const ghostTop=cy-step*0.8;
  const col=Math.round((ghostLeft-gr.left)/step);
  const row=Math.round((ghostTop-gr.top)/step);
  return{row,col};
}

function dMove(e){
  if(dIdx===null)return;
  e.preventDefault();
  const p=evp(e);
  _lastX=p.x;_lastY=p.y;
  posGhost(p.x,p.y);
  if(!_rafPending){
    _rafPending=true;
    requestAnimationFrame(()=>{
      _rafPending=false;
      if(dIdx===null||!dPiece)return;
      clearPrev();
      const{row,col}=cursorToGrid(_lastX,_lastY);
      showPrev(dPiece,row,col);
    });
  }
}

function dEnd(e){
  if(dIdx===null)return;
  const p=e.changedTouches?{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY}:{x:e.clientX,y:e.clientY};
  document.getElementById('ghost').style.display='none';
  clearPrev();
  const{row,col}=cursorToGrid(p.x,p.y);
  tryPlace(dIdx,row,col);
  document.getElementById(`sl${dIdx}`)?.classList.remove('drag-src');
  dIdx=null;dPiece=null;
  document.removeEventListener('mousemove',dMove);
  document.removeEventListener('mouseup',dEnd);
  document.removeEventListener('touchmove',dMove);
  document.removeEventListener('touchend',dEnd);
}

function canPlace(piece,sr,sc){
  return piece.cells.every(([dr,dc])=>{const r=sr+dr,c=sc+dc;return r>=0&&r<ROWS&&c>=0&&c<COLS&&!grid[r][c];});
}

function showPrev(piece,sr,sc){
  const ok=canPlace(piece,sr,sc);
  piece.cells.forEach(([dr,dc],ci)=>{
    const r=sr+dr,c=sc+dc;
    if(r<0||r>=ROWS||c<0||c>=COLS)return;
    const el=document.getElementById(`c${r}_${c}`);
    if(el&&!grid[r][c]){
      el.className='cell '+(ok?'prev-ok':'prev-bad');
      if(ok) applyBlockStyle(el,equippedBlk,piece.cellColors[ci]);
      else {el.style.background='';el.style.backgroundImage='';el.style.filter='';}
    }
    prevCells.push({r,c});
  });
}

function clearPrev(){
  prevCells.forEach(({r,c})=>{
    const el=document.getElementById(`c${r}_${c}`);
    if(el&&!grid[r][c]){el.className='cell';el.style.backgroundImage='';el.style.filter='';el.style.background='';}
  });
  prevCells=[];
}

function tryPlace(idx,sr,sc){
  const piece=pieces[idx];if(!piece)return;
  if(!canPlace(piece,sr,sc)){
    document.getElementById('grid-wrap').classList.add('shake');
    setTimeout(()=>document.getElementById('grid-wrap').classList.remove('shake'),360);
    sfxBad();return;
  }
  piece.cells.forEach(([dr,dc],ci)=>{
    const r=sr+dr,c=sc+dc;
    const cellColor=piece.cellColors[ci];
    grid[r][c]=cellColor;
    const el=document.getElementById(`c${r}_${c}`);
    el.className='cell filled pop-in';
    applyBlockStyle(el,equippedBlk,cellColor);
    setTimeout(()=>el.classList.remove('pop-in'),240);
  });
  score+=piece.cells.length;piecesPlaced++;
  pieces[idx]=null;sfxPlace();
  setTimeout(checkLines,115);
}

// ============================================================
// LINE CLEARING
// ============================================================
function checkLines(){
  const fr=[],fc=[];
  for(let r=0;r<ROWS;r++)if(grid[r].every(v=>v))fr.push(r);
  for(let c=0;c<COLS;c++)if(grid.map(row=>row[c]).every(v=>v))fc.push(c);
  const tot=fr.length+fc.length;
  if(tot>0){
    combo++;
    const mul=Math.max(1,combo);
    const pts=tot*10*COLS*mul;
    score+=pts;linesClr+=tot;

    // COINS: 100 xu per line cleared
    coins+=tot*100;
    saveData();
    updateUI();

    sfxClear(tot);if(combo>=2){sfxCombo();showCombo(combo);}
    flashLines(fr,fc);
    const keys=new Set();
    fr.forEach(r=>{for(let c=0;c<COLS;c++)keys.add(`${r}_${c}`);});
    fc.forEach(c=>{for(let r=0;r<ROWS;r++)keys.add(`${r}_${c}`);});
    keys.forEach(k=>{const el=document.getElementById(`c${k}`);if(el)el.classList.add('pop-out');});
    spawnFx(fr,fc);
    fxTxt(`+${pts}`,'#f5c518');
    fxTxt(`+${tot*100}🪙`,'#ffe066',44);
    if(combo>=2)fxTxt(`COMBO x${combo}!`,'#ff88dd',-44);
    setTimeout(()=>{
      keys.forEach(k=>{const[r,c]=k.split('_').map(Number);grid[r][c]=0;});
      renderGrid();afterPlace();
    },340);
  } else {
    combo=0;hideComboBadge();afterPlace();
  }
  updateUI();
}

function flashLines(rows,cols){
  const g=document.getElementById('grid');const cs=getCS();const step=cs+GAP_PX;
  rows.forEach(r=>{const fl=document.createElement('div');fl.className='ln-flash';fl.style.cssText=`left:0;top:${r*step}px;width:${COLS*step-GAP_PX}px;height:${cs}px;`;g.appendChild(fl);setTimeout(()=>fl.remove(),420);});
  cols.forEach(c=>{const fl=document.createElement('div');fl.className='ln-flash';fl.style.cssText=`left:${c*step}px;top:0;width:${cs}px;height:${ROWS*step-GAP_PX}px;`;g.appendChild(fl);setTimeout(()=>fl.remove(),420);});
}

function afterPlace(){
  if(pieces.every(p=>!p)){
    genTray();
    if(piecesPlaced>0&&piecesPlaced%15===0){level++;fxTxt('LEVEL UP! ⭐','#cc88ff',-60);}
  } else renderTray();
  updateUI();
  if(!canPlaceAny())setTimeout(gameOver,480);
}

function canPlaceAny(){
  return pieces.some(p=>{
    if(!p)return false;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(canPlace(p,r,c))return true;
    return false;
  });
}

// ============================================================
// FX
// ============================================================
const EMOJIS=['✨','⭐','💛','🌟','💥','🎉','👑','🔥'];
function spawnFx(rows,cols){
  const n=Math.min((rows.length+cols.length)*4,20);
  const wr=document.getElementById('grid-wrap').getBoundingClientRect();
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='fx-p';
    el.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
    el.style.cssText=`left:${wr.left+Math.random()*wr.width}px;top:${wr.top+Math.random()*wr.height}px;animation-delay:${Math.random()*.35}s;font-size:${16+Math.random()*14}px;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1000);
  }
}
function fxTxt(txt,col,dy=0){
  const el=document.createElement('div');el.className='fx-t';
  el.textContent=txt;
  el.style.cssText=`left:${window.innerWidth/2}px;top:${window.innerHeight*.35+dy}px;transform:translateX(-50%);color:${col};font-size:${txt.length>7?14:22}px;`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1150);
}
let comboBadgeTimer=null;
function showCombo(n){
  const b=document.getElementById('combo-badge');
  document.getElementById('combo-val').textContent=`x${n}`;
  b.classList.add('show');clearTimeout(comboBadgeTimer);
  comboBadgeTimer=setTimeout(hideComboBadge,1800);
}
function hideComboBadge(){document.getElementById('combo-badge').classList.remove('show');}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(showToast._timer);
  showToast._timer=setTimeout(()=>t.style.display='none',2000);
}

// ============================================================
// UI
// ============================================================
function updateUI(){
  document.getElementById('score-display').textContent=score.toLocaleString();
  if(score>best){best=score;saveData();}
  document.getElementById('best-val').textContent=best.toLocaleString();
  document.getElementById('coin-val').textContent=coins.toLocaleString();
  document.getElementById('shop-coin-val').textContent=coins.toLocaleString();
}

// ============================================================
// SHOP
// ============================================================
let currentTab='bg';

function openShop(){
  document.getElementById('shop-overlay').classList.add('open');
  renderShop();
}
function closeShop(){document.getElementById('shop-overlay').classList.remove('open');}
function closeShopOut(e){if(e.target===document.getElementById('shop-overlay'))closeShop();}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.shop-tab').forEach((t,i)=>{
    t.classList.toggle('active',(i===0&&tab==='bg')||(i===1&&tab==='block'));
  });
  renderShop();
}

function renderShop(){
  const grid=document.getElementById('shop-grid');
  grid.innerHTML='';
  const items=currentTab==='bg'?BG_SKINS:BLOCK_SKINS;
  const owned=currentTab==='bg'?ownedBgs:ownedBlks;
  const equipped=currentTab==='bg'?equippedBg:equippedBlk;

  items.forEach(item=>{
    const isOwned=owned.includes(item.id);
    const isEquipped=equipped===item.id;
    const div=document.createElement('div');
    div.className='shop-item'+(isEquipped?' equipped':isOwned?' owned':'');

    // Preview
    let previewHtml='';
    if(currentTab==='bg'){
      const bgStyle=item.gradient
        ? `background:${item.gradient}`
        : `background-image:url('${item.img}');background-size:cover;background-position:center`;
      previewHtml=`<div style="${bgStyle};border-radius:10px;width:80px;height:60px;"></div>`;
    } else {
      if(item.colors){
        // Default block: show colored squares
        const cells=item.colors.slice(0,9).map(col=>`<div style="border-radius:3px;background:${col};box-shadow:inset 0 -2px 0 rgba(0,0,0,.35),inset 0 2px 0 rgba(255,255,255,.3)"></div>`).join('');
        previewHtml=`<div class="shop-item-preview">${cells}</div>`;
      } else {
        previewHtml=`<div style="width:80px;height:80px;border-radius:12px;overflow:hidden;box-shadow:inset 0 -4px 0 rgba(0,0,0,.35)"><img src="${item.img}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentNode.style.background='#555';this.style.display='none'"/></div>`;
      }
    }

    // Badge
    let badgeHtml='';
    if(isEquipped) badgeHtml=`<div class="shop-badge badge-equipped">Đang dùng</div>`;
    else if(isOwned) badgeHtml=`<div class="shop-badge badge-owned">Đã mua</div>`;

    // Button
    let btnHtml='';
    if(isEquipped){
      btnHtml=`<button class="equip-btn" disabled>✓ Đang dùng</button>`;
    } else if(isOwned){
      btnHtml=`<button class="equip-btn" onclick="equipItem('${currentTab}',${item.id})">Trang bị</button>`;
    } else {
      const canAfford=coins>=item.price;
      btnHtml=`<button class="buy-btn" ${!canAfford?'disabled':''} onclick="buyItem('${currentTab}',${item.id},${item.price})">
        ${canAfford?`Mua - ${item.price.toLocaleString()}🪙`:`${item.price.toLocaleString()}🪙`}
      </button>`;
    }

    div.innerHTML=`
      ${badgeHtml}
      ${previewHtml}
      <div class="shop-item-name">${item.name}</div>
      <div class="shop-item-price ${item.price===0?'free':''}">${item.price===0?'🎁 Miễn phí':'🪙 '+item.price.toLocaleString()}</div>
      ${btnHtml}
    `;
    grid.appendChild(div);
  });
}

function buyItem(type,id,price){
  if(coins<price){showToast('❌ Không đủ xu!');return;}
  coins-=price;
  if(type==='bg') ownedBgs.push(id);
  else ownedBlks.push(id);
  saveData();sfxBuy();
  showToast('✅ Mua thành công!');
  updateUI();renderShop();
}

function equipItem(type,id){
  if(type==='bg'){equippedBg=id;}
  else{equippedBlk=id;}
  saveData();applySkins();
  renderShop();
  showToast('✨ Đã trang bị!');
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame(){
  document.getElementById('ov-start').style.display='none';
  initAudio();newGame();
  musicOn=true;document.getElementById('mute-btn').textContent='🔇';startMusic();
}

function newGame(){
  active=true;score=0;combo=0;linesClr=0;piecesPlaced=0;level=1;
  dIdx=null;dPiece=null;prevCells=[];
  document.getElementById('ov-over').style.display='none';
  document.getElementById('ghost').style.display='none';
  hideComboBadge();
  initGrid();buildGridDOM();applySkins();genTray();updateUI();
}

function gameOver(){
  active=false;sfxOver();
  const isNew=score>=best;
  document.getElementById('ov-banner').textContent=isNew?'NEW BEST':'ĐIỂM CỦA BẠN';
  document.getElementById('ov-score').textContent=score.toLocaleString();
  document.getElementById('ov-over').style.display='flex';
}

// INIT
updateUI();
applySkins();
</script>
</body>
</html>
